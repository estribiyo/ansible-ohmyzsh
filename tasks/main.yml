- name: Install Oh My Zsh!
  git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: /home/{{ ansible_user }}/.oh-my-zsh
    depth: 1
    version: master

- name: Install Powerlevel10K for Zsh
  git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: /home/{{ ansible_user }}/.oh-my-zsh/custom/themes/powerlevel10k
    depth: 1
    version: master

- name: Install plugin zsh-syntax-highlighting
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: /home/{{ ansible_user }}/.oh-my-zsh/plugins/zsh-syntax-highlighting
    depth: 1
    version: master

- name: Install plugin zsh-autosuggestions
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: /home/{{ ansible_user }}/.oh-my-zsh/plugins/zsh-autosuggestions
    depth: 1
    version: master

- name: Copy default zsh rc file to /home/{{ ansible_user }}/.zshrc
  copy:
    src: /home/{{ ansible_user }}/.oh-my-zsh/templates/zshrc.zsh-template
    dest: /home/{{ ansible_user }}/.zshrc
    remote_src: yes

- name: Changing default zsh console settings
  lineinfile:
    dest: /home/{{ ansible_user }}/.zshrc
    state: present
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  with_items:
    - { regexp: 'ZSH_THEME="robbyrussell"', line: "#ZSH_THEME=\"robbyrussell\"\nZSH_THEME=\"powerlevel10k/powerlevel10k\"" }
    - { regexp: 'plugins=(\(.+\))', line: "plugins=(git zsh-autosuggestions zsh-syntax-highlighting)" }

